name: Boyer used inventory feed

on:
  schedule:
    - cron: "0 11 * * *"   # 06:00/07:00 America/Toronto (DST-dependent)
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: boyer-used-feed
  cancel-in-progress: false

jobs:
  scrape:
    # Self-hosted runner on Mark's Mac Mini. Cloudflare on boyerhyundai.com
    # blocks GitHub-hosted runner IPs (Azure); running from the Mini's
    # residential IP bypasses that.
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 5
    steps:
      - name: Checkout main
        uses: actions/checkout@v6

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Install Playwright Chromium (idempotent)
        run: npx playwright install chromium

      - name: Run scraper
        id: scrape
        continue-on-error: true
        run: |
          mkdir -p out
          set -o pipefail
          node scrape_used_inventory.mjs out/boyer_used_feed.tsv 2>&1 | tee /tmp/scrape.log
          wc -l out/boyer_used_feed.tsv

      - name: Stash artifact
        if: steps.scrape.outcome == 'success'
        run: |
          mkdir -p /tmp/feed-out
          cp out/boyer_used_feed.tsv /tmp/feed-out/

      - name: Checkout gh-pages
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: pages

      - name: Publish feed.tsv to gh-pages
        if: steps.scrape.outcome == 'success'
        working-directory: pages
        run: |
          mkdir -p boyer
          cp /tmp/feed-out/boyer_used_feed.tsv boyer/used_feed.tsv
          date -u +"%Y-%m-%dT%H:%M:%SZ" > boyer/used_feed.timestamp

      - name: Build status report (always)
        if: always()
        env:
          NEW_FEED_PATH: out/boyer_used_feed.tsv
          PAGES_DIR: pages
          STATUS_OK: ${{ steps.scrape.outcome == 'success' }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          STATUS_TO: ${{ vars.STATUS_TO || 'mark@weirmedia.ca' }}
          STATUS_FROM: ${{ vars.STATUS_FROM || 'Boyer Feed Bot <hello@weirmedia.ca>' }}
        run: |
          # capture last 40 lines of scraper log for failure email
          if [ -f /tmp/scrape.log ]; then
            export SCRAPE_LOG_TAIL="$(tail -40 /tmp/scrape.log)"
          fi
          node report_status.mjs

      - name: Commit + push gh-pages
        if: always()
        working-directory: pages
        run: |
          git config user.name  "wmpe-bot"
          git config user.email "bot@weirmedia.ca"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to publish."
          else
            git commit -m "feed + status $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi

      - name: Fail workflow if scraper failed
        if: steps.scrape.outcome != 'success'
        run: |
          echo "Scraper failed — see /tmp/scrape.log above."
          exit 1
